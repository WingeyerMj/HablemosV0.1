services:
  - type: web
    name: hablemos-de-yhwh
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18.0.0
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: hablemos-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: hablemos-db
    plan: free

